name: Flask CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Run linter (flake8)
        run: |
          echo "Running flake8..."
          flake8 .

      - name: 🧪 Run tests (pytest)
        run: |
          echo "Running tests..."          
          export PYTHONPATH=.
          pytest --maxfail=1 --disable-warnings -v --junitxml=pytest-report.xml

      - name: 📊 Show logs / coverage (optional)
        run: |
          echo "Showing test logs complete"
          
      - name: Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}       # run this step even if previous step failed
        with:
          name: Pytest Results
          path: pytest-report.xml
          reporter: java-junit
